<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ocean Theme</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      overflow-x: hidden;
      color: white;
      scroll-behavior: smooth;
    }

    /* 🌊 Animated Ocean Gradient */
    body::before {
      content: "";
      position: fixed;
      width: 200%;
      height: 200%;
      background: linear-gradient(
        45deg,
        #001f3f,
        #0074D9,
        #00c6ff,
        #001f3f
      );
      background-size: 400% 400%;
      animation: oceanFlow 12s ease infinite;
      z-index: -2;
    }

    @keyframes oceanFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* 🫧 Floating bubbles */
    .bubble {
      position: absolute;
      bottom: -100px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      animation: rise linear infinite;
    }

    @keyframes rise {
      from {
        transform: translateY(0) scale(1);
        opacity: 1;
      }
      to {
        transform: translateY(-120vh) scale(1.5);
        opacity: 0;
      }
    }

    header {
      text-align: center;
      padding: 80px 20px;
    }

    header h1 {
      font-size: 3rem;
      letter-spacing: 2px;
      animation: fadeIn 2s ease;
    }

    header p {
      margin-top: 10px;
      opacity: 0.8;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px);}
      to { opacity: 1; transform: translateY(0);}
    }

    section {
      padding: 60px 20px;
      text-align: center;
    }

    .card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      padding: 20px;
      margin: 20px auto;
      width: 80%;
      transition: 0.4s;
    }

    .card:hover {
      transform: translateY(-10px) scale(1.02);
      background: rgba(255,255,255,0.2);
    }

    button {
      margin-top: 20px;
      padding: 12px 25px;
      border: none;
      border-radius: 25px;
      background: #00c6ff;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #0074D9;
      transform: scale(1.1);
    }

    footer {
      text-align: center;
      padding: 20px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

  <!-- 🫧 Bubbles -->
  <div class="bubble" style="left:10%; width:20px; height:20px; animation-duration:8s;"></div>
  <div class="bubble" style="left:30%; width:15px; height:15px; animation-duration:10s;"></div>
  <div class="bubble" style="left:50%; width:25px; height:25px; animation-duration:7s;"></div>
  <div class="bubble" style="left:70%; width:18px; height:18px; animation-duration:9s;"></div>
  <div class="bubble" style="left:90%; width:22px; height:22px; animation-duration:11s;"></div>

  <!-- 🌊 Header -->
  <header>
    <h1>Deep Ocean World</h1>
    <p>Explore the calm, beauty, and mystery of the sea</p>
    <button onclick="scrollToSection()">Explore</button>
  </header>

  <!-- 🌊 Content -->
  <section id="content">
    <div class="card">
      <h2>🌊 Serenity</h2>
      <p>The ocean teaches us calmness and depth.</p>
    </div>

    <div class="card">
      <h2>🐠 Life</h2>
      <p>Millions of species live beneath the waves.</p>
    </div>

    <div class="card">
      <h2>✨ Mystery</h2>
      <p>More than 80% of the ocean is unexplored.</p>
    </div>
  </section>

  <!-- 🌊 Footer -->
  <footer>
    <p>Made with 💙 Ocean Vibes</p>
  </footer>

  <script>
    function scrollToSection() {
      document.getElementById("content").scrollIntoView({
        behavior: "smooth"
      });
    }
  </script>

</body>
</html>
