<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jungle Vibes</title>

<style>
:root{
  --dark:#071e14;
  --green:#14532d;
  --light:#22c55e;
  --leaf:#4ade80;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:sans-serif;
}

body{
  background: radial-gradient(circle at top,#0b3d2e,#041a14);
  color:#eaffea;
  overflow-x:hidden;
}

/* floating leaves */
.leaf{
  position:absolute;
  width:20px;
  height:20px;
  background:var(--leaf);
  border-radius:50% 0 50% 0;
  opacity:0.6;
  animation:fall linear infinite;
}

@keyframes fall{
  from{transform:translateY(-100px) rotate(0deg);} 
  to{transform:translateY(110vh) rotate(360deg);} 
}

/* tree shapes */
.tree{
  position:absolute;
  bottom:0;
  width:120px;
  height:200px;
}

.trunk{
  width:20px;
  height:100px;
  background:#3f2a14;
  margin:auto;
}

.leaves{
  width:120px;
  height:120px;
  background:radial-gradient(circle,#166534,#052e16);
  border-radius:50%;
  margin-top:-40px;
  animation:sway 4s ease-in-out infinite;
}

@keyframes sway{
  0%,100%{transform:rotate(0deg);} 
  50%{transform:rotate(5deg);} 
}

header{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

h1{
  font-size:3.5rem;
  letter-spacing:4px;
  color:#a7f3d0;
  animation:glow 2s infinite alternate;
}

@keyframes glow{
  from{text-shadow:0 0 10px #22c55e;} 
  to{text-shadow:0 0 30px #4ade80;} 
}

.subtitle{
  margin-top:10px;
  opacity:0.7;
}

.section{
  padding:80px 20px;
  text-align:center;
}

.cards{
  display:flex;
  justify-content:center;
  gap:25px;
  flex-wrap:wrap;
  margin-top:40px;
}

.card{
  width:250px;
  padding:20px;
  border-radius:15px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.1);
  transition:0.4s;
}

.card:hover{
  transform:translateY(-12px) scale(1.05);
  box-shadow:0 15px 40px rgba(0,0,0,0.6);
}

footer{
  text-align:center;
  padding:30px;
  opacity:0.6;
}

</style>
</head>
<body>

<!-- Leaves -->
<script>
for(let i=0;i<25;i++){
  const leaf=document.createElement('div');
  leaf.className='leaf';
  leaf.style.left=Math.random()*100+'vw';
  leaf.style.animationDuration=(5+Math.random()*5)+'s';
  document.body.appendChild(leaf);
}
</script>

<!-- Trees -->
<div class="tree" style="left:5%">
  <div class="leaves"></div>
  <div class="trunk"></div>
</div>

<div class="tree" style="left:80%">
  <div class="leaves"></div>
  <div class="trunk"></div>
</div>

<header>
  <h1>JUNGLE</h1>
  <p class="subtitle">alive • wild • green</p>
</header>

<section class="section">
  <h2>Nature Elements</h2>

  <div class="cards">
    <div class="card">
      <h3>Trees</h3>
      <p>strong roots deep in earth</p>
    </div>

    <div class="card">
      <h3>Leaves</h3>
      <p>flowing with wind and life</p>
    </div>

    <div class="card">
      <h3>Wild</h3>
      <p>nature free and untamed</p>
    </div>
  </div>
</section>

<footer>
  jungle vibes 🌿
</footer>

</body>
</html>
