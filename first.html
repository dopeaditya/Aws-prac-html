<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mental Health</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  overflow-x: hidden;
}

.container {
  text-align: center;
  padding: 100px 20px;
  animation: fadeIn 2s ease-in;
}

h1 {
  font-size: 3rem;
}

p {
  max-width: 600px;
  margin: 20px auto;
  line-height: 1.6;
  opacity: 0.9;
}

.card {
  margin-top: 40px;
  padding: 20px;
  border-radius: 15px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(30px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="container">
  <h1>🧠 Mental Health Matters</h1>
  <p>Your mental well-being is just as important as your physical health. Take time to rest, reflect, and heal.</p>

  <div class="card">
    <h2>Self Care</h2>
    <p>Take breaks, meditate, and allow yourself to breathe.</p>
  </div>

  <div class="card">
    <h2>Talk It Out</h2>
    <p>Sharing your thoughts can lighten your emotional load.</p>
  </div>
</div>

</body>
</html>
